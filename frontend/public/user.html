<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans antialiased transition-colors duration-200">
    <!-- Navbar -->
    <nav class="bg-white dark:bg-gray-800 shadow dark:shadow-gray-900 transition-colors">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <svg class="w-8 h-8 text-blue-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <a href="#"><span class="font-bold text-xl text-gray-900 dark:text-white">Library Portal</span></a>
                </div>
                <div class="hidden sm:flex ml-10 space-x-8">
                    <button onclick="toggleTab('all')" id="tab-all" class="text-gray-900 dark:text-gray-100 inline-flex items-center px-1 pt-1 border-b-2 border-blue-500 text-sm font-medium">All Books</button>
                    <button onclick="toggleTab('my')" id="tab-my" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium">My Borrowed</button>
                </div>
                <div class="flex items-center flex-1 justify-end">
                    <span id="welcomeMsg" class="mr-4 text-sm font-medium text-gray-500 dark:text-gray-400"></span>
                    <button onclick="toggleDarkMode()" class="mr-4 p-2 rounded-full bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 shadow-sm hover:shadow transition">
                        <svg class="w-4 h-4 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                        <svg class="w-4 h-4 block dark:hidden text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </button>
                    <button onclick="logout()" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition shadow-sm">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden transition-colors">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 sm:flex sm:items-center sm:justify-between">
                <div class="mb-4 sm:mb-0">
                    <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Available Books</h2>
                    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Search and borrow books from our catalog.</p>
                </div>
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="relative rounded-md shadow-sm">
                        <select id="categoryFilter" onchange="currentPage=1; loadBooks()" class="focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-md py-2 px-3 border transition outline-none">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                    <div class="relative rounded-md shadow-sm sm:w-64">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="search" onkeyup="currentPage=1; loadBooks()" placeholder="Search by title or author..." class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-md py-2 border transition outline-none">
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                    <thead class="bg-gray-50 dark:bg-gray-800">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Book Title</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Author</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Categories</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Action</th>
                        </tr>
                    </thead>
                    <tbody id="booksList" class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                        <!-- Books will be populated here -->
                    </tbody>
                </table>
            </div>
            <div id="paginationControls" class="px-6 py-4 flex justify-between items-center border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
                <button onclick="changePage(currentPage - 1)" class="px-4 py-2 border rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600 shadow-sm transition disabled:opacity-50">Previous</button>
                <span id="pageInfo" class="text-sm text-gray-700 dark:text-gray-300">Page 1 of 1</span>
                <button onclick="changePage(currentPage + 1)" class="px-4 py-2 border rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600 shadow-sm transition disabled:opacity-50">Next</button>
            </div>
            <div id="emptyState" class="hidden p-8 text-center text-gray-500 dark:text-gray-400">
                No books found.
            </div>
        </div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user || user.role !== 'User') window.location.href = '/';
        
        let currentTab = 'all';
        let allCategories = [];
        let currentPage = 1;
        let currentLimit = 10;

        function changePage(page) {
            if (page < 1) return;
            currentPage = page;
            loadBooks();
        }

        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                allCategories = await res.json();
                const select = document.getElementById('categoryFilter');
                allCategories.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.name;
                    opt.textContent = c.name;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('Error fetching categories:', e); }
        }

        function toggleTab(tab) {
            currentTab = tab;
            currentPage = 1; // Reset page
            if (tab === 'all') {
                document.getElementById('tab-all').classList.replace('border-transparent', 'border-blue-500');
                document.getElementById('tab-all').classList.replace('text-gray-500', 'text-gray-900');
                document.getElementById('tab-my').classList.replace('border-blue-500', 'border-transparent');
                document.getElementById('tab-my').classList.replace('text-gray-900', 'text-gray-500');
                document.getElementById('search').placeholder = 'Search by title or author...';
            } else {
                document.getElementById('tab-my').classList.replace('border-transparent', 'border-blue-500');
                document.getElementById('tab-my').classList.replace('text-gray-500', 'text-gray-900');
                document.getElementById('tab-all').classList.replace('border-blue-500', 'border-transparent');
                document.getElementById('tab-all').classList.replace('text-gray-900', 'text-gray-500');
                document.getElementById('search').placeholder = 'Search my books...';
            }
            loadBooks();
        }

        document.getElementById('welcomeMsg').textContent = `Welcome, ${user.username}`;
        
        async function loadBooks() {
            const search = document.getElementById('search').value;
            const filterCat = document.getElementById('categoryFilter').value;
            
            let queryParams = `?page=${currentPage}&limit=${currentLimit}`;
            if (search) queryParams += `&search=${encodeURIComponent(search)}`;
            if (filterCat) queryParams += `&category=${encodeURIComponent(filterCat)}`;
            if (currentTab === 'my') queryParams += `&filterMy=${user.id}`;
            
            const res = await fetch(`/api/books${queryParams}`);
            const data = await res.json();
            const books = data.books || [];
            
            const list = document.getElementById('booksList');
            const emptyState = document.getElementById('emptyState');
            
            list.innerHTML = '';
            
            // Pagination controls update
            document.getElementById('pageInfo').textContent = `Page ${data.currentPage} of ${data.totalPages || 1}`;
            const controlsButtons = document.querySelectorAll('#paginationControls button');
            controlsButtons[0].disabled = data.currentPage <= 1;
            controlsButtons[1].disabled = data.currentPage >= (data.totalPages || 1);

            if (books.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.textContent = currentTab === 'my' ? 'You have not borrowed any books.' : 'No books found.';
            } else {
                emptyState.classList.add('hidden');
                books.forEach(b => {
                    const isAvailable = b.status === 'Available';
                    const isMyBook = b.borrowed_by === user.id;

                    const statusBadge = isAvailable 
                        ? `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Available</span>`
                        : (isMyBook ? `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">Borrowed by You</span>` : `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">Borrowed</span>`);
                    
                    const catNames = (b.categories && b.categories.length > 0) ? b.categories.join(', ') : 'None';

                    let actionButton = '';
                    if (isAvailable) {
                        actionButton = `<button onclick="borrow(${b.id})" class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none transition">Borrow</button>`;
                    } else if (isMyBook) {
                        actionButton = `<button onclick="returnBook(${b.id})" class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded shadow-sm text-green-700 bg-green-100 hover:bg-green-200 focus:outline-none transition">Return</button>`;
                    } else {
                        actionButton = `<span class="text-sm text-gray-400 italic">Not available</span>`;
                    }

                    list.innerHTML += `
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white">${b.title}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">${b.author}</td>
                            <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400 max-w-[200px] truncate" title="${catNames}">${catNames}</td>
                            <td class="px-6 py-4 whitespace-nowrap">${statusBadge}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                ${actionButton}
                            </td>
                        </tr>
                    `;
                });
            }
        }

        async function borrow(id) {
            await fetch('/api/borrow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bookId: id, userId: user.id })
            });
            loadBooks();
        }

        async function returnBook(id) {
            await fetch('/api/return', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bookId: id, userId: user.id })
            });
            loadBooks();
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        function logout() { localStorage.clear(); window.location.href = '/'; }
        
        document.getElementById('search').addEventListener('input', loadBooks);
        document.getElementById('categoryFilter').addEventListener('change', loadBooks);
        
        async function initialize() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            await loadCategories();
            loadBooks();
        }
        
        initialize();
    </script>
</body>
</html>
